<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết di tích</title>

    <link rel="stylesheet" href="style.css">

    <style>

        .detail{
            max-width:1000px;
            margin:auto;
            padding:30px;
        }

        .detail img{
            width:100%;
            max-height:500px;
            object-fit:cover;
            border-radius:10px;
            margin:20px 0;
        }

        .info{
            background:#fff;
            padding:20px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,.15);
        }

        iframe{
            width:100%;
            height:500px;
            margin-top:20px;
        }

        a.button{
            display:inline-block;
            padding:12px 20px;
            background:#b30000;
            color:#fff;
            text-decoration:none;
            border-radius:6px;
            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="detail">

    <div class="info">

        <h1 id="ten"></h1>

        <p>
            <strong>Địa chỉ:</strong>
            <span id="diaChi"></span>
        </p>

        <p>
            <strong>Xếp hạng:</strong>
            <span id="xepHang"></span>
        </p>

        <img id="hinhAnh">

        <h2>Giới thiệu</h2>

        <p id="moTa"></p>

        <h2>Lịch sử</h2>

        <p id="lichSu"></p>

        <div id="video"></div>

        <p>
            <a id="taiLieu" class="button" target="_blank">
                Xem tài liệu
            </a>
        </p>

    </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>

</html>
